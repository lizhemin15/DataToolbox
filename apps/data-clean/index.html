<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据清洗 - 数据工具箱</title>
    <link rel="stylesheet" href="style.css">
    <script src="../../lib/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <div class="logo-title">
                <span class="app-logo">🧹</span>
                <h1>数据清洗</h1>
            </div>
        </header>
        
        <main class="content">
            <div id="uploadSection" class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <h3>拖拽或点击上传 Excel 文件</h3>
                    <p>支持 .xlsx, .xls, .csv 格式</p>
                    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden>
                    <div class="upload-buttons">
                        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
                        <button class="sample-btn" onclick="downloadSample()">下载示例文件</button>
                    </div>
                </div>
                
                <div class="config-section" id="configSection" style="display: none;">
                    <h3>配置清洗参数</h3>
                    
                    <div class="form-group">
                        <label>清洗操作:</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="removeEmptyRows" checked>
                                <span>删除空行</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="removeEmptyColumns" checked>
                                <span>删除空列</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="trimSpaces" checked>
                                <span>去除首尾空格</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="removeExtraSpaces">
                                <span>合并多余空格</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="removeDuplicates">
                                <span>删除完全重复行</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="normalizeLineBreaks">
                                <span>规范化换行符</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>空值判定:</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="emptyCheck" value="strict" checked>
                                <span>严格（完全为空）</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="emptyCheck" value="loose">
                                <span>宽松（包括空格）</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="file-info" id="fileInfo"></div>
                    <button class="process-btn" onclick="startClean()">开始清洗</button>
                </div>
            </div>
            
            <div id="processingSection" class="processing-section" style="display: none;">
                <div class="progress-container">
                    <div class="progress-icon">⏳</div>
                    <h3>正在处理中...</h3>
                </div>
            </div>
            
            <div id="resultSection" class="result-section" style="display: none;">
                <div class="result-header">
                    <h3>✓ 清洗完成</h3>
                    <button class="download-btn" onclick="downloadResult()">下载结果</button>
                </div>
                <div class="result-stats" id="resultStats"></div>
                <div class="result-preview" id="resultPreview"></div>
                <button class="reset-btn" onclick="reset()">重新处理</button>
            </div>
        </main>
        
        <footer class="footer">
            <p>开发者：李哲民</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
