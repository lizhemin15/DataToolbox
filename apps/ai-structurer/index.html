<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI结构化 - 数据工具箱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <div class="logo-title">
                <span class="app-logo">🤖</span>
                <h1>AI结构化</h1>
            </div>
            <button class="settings-btn" onclick="toggleSettings()">⚙️ 设置</button>
        </header>
        
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>API 设置</h3>
                    <button class="close-btn" onclick="toggleSettings()">✕</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="apiUrl">API URL:</label>
                        <input type="text" id="apiUrl" placeholder="https://api.openai.com/v1/chat/completions">
                    </div>
                    <div class="form-group">
                        <label for="apiKey">API Key:</label>
                        <input type="password" id="apiKey" placeholder="sk-...">
                    </div>
                    <div class="form-group">
                        <label for="apiModel">Model:</label>
                        <input type="text" id="apiModel" list="modelList" placeholder="选择或输入模型名称">
                        <datalist id="modelList">
                            <option value="gpt-4o">
                            <option value="gpt-4o-mini">
                            <option value="gpt-4-turbo">
                            <option value="gpt-3.5-turbo">
                            <option value="claude-3-5-sonnet-20241022">
                            <option value="claude-3-opus-20240229">
                            <option value="qwen-max">
                            <option value="qwen-plus">
                            <option value="qwen-turbo">
                            <option value="qwen2.5-72b-instruct">
                            <option value="qwen2.5-32b-instruct">
                            <option value="qwen2.5-14b-instruct">
                            <option value="qwen2.5-7b-instruct">
                            <option value="glm-4-plus">
                            <option value="glm-4">
                            <option value="glm-4-flash">
                            <option value="glm-3-turbo">
                            <option value="ERNIE-4.0-8K">
                            <option value="ERNIE-3.5-8K">
                            <option value="ERNIE-Speed-8K">
                            <option value="deepseek-chat">
                            <option value="deepseek-coder">
                            <option value="moonshot-v1-8k">
                            <option value="moonshot-v1-32k">
                            <option value="moonshot-v1-128k">
                            <option value="yi-large">
                            <option value="yi-medium">
                            <option value="doubao-pro-32k">
                            <option value="doubao-lite-32k">
                            <option value="gemini-1.5-pro">
                            <option value="gemini-1.5-flash">
                        </datalist>
                    </div>
                    <button class="save-btn" onclick="saveSettings()">保存设置</button>
                </div>
            </div>
        </div>
        
        <main class="content">
            <div id="mainSection" class="main-section">
                <div class="input-area">
                    <h3>📝 输入非结构化文本</h3>
                    <textarea id="inputText" placeholder="请输入需要结构化的文本内容..."></textarea>
                    <button class="example-btn" onclick="loadExample()">加载示例</button>
                </div>
                
                <div class="schema-area">
                    <h3>📋 定义JSON格式</h3>
                    <textarea id="jsonSchema" placeholder='请输入期望的JSON格式...

示例：
{
  "name": "string",
  "age": "number",
  "email": "string"
}'></textarea>
                </div>
                
                <div class="options-area">
                    <h3>⚙️ 转换选项</h3>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="mode" value="native" checked>
                            <span>模式1：使用AI原生JSON格式返回</span>
                            <p class="mode-desc">使用API的response_format参数，确保返回严格的JSON格式</p>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="mode" value="prompt">
                            <span>模式2：提示词+程序处理</span>
                            <p class="mode-desc">通过提示词引导AI返回JSON，然后程序进一步处理确保格式正确</p>
                        </label>
                    </div>
                    <button class="process-btn" onclick="startProcessing()">开始转换</button>
                </div>
            </div>
            
            <div id="processingSection" class="processing-section" style="display: none;">
                <div class="progress-container">
                    <div class="progress-icon">⏳</div>
                    <h3>正在处理中...</h3>
                    <p id="statusText">正在调用AI模型...</p>
                </div>
            </div>
            
            <div id="resultSection" class="result-section" style="display: none;">
                <div class="result-header">
                    <h3>✓ 转换完成</h3>
                    <div class="result-actions">
                        <button class="copy-btn" onclick="copyResult()">📋 复制结果</button>
                        <button class="download-btn" onclick="downloadResult()">💾 下载JSON</button>
                    </div>
                </div>
                <div class="result-preview">
                    <pre id="resultJson"></pre>
                </div>
                <button class="reset-btn" onclick="reset()">重新转换</button>
            </div>
        </main>
        
        <footer class="footer">
            <p>开发者：李哲民</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
