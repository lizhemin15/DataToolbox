<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>局域网聊天</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar" id="myAvatar"></div>
                    <div class="user-name" id="myName">我</div>
                </div>
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot offline"></span>
                    <span class="status-text">离线</span>
                </div>
            </div>
            <div class="search-bar">
                <input type="text" placeholder="搜索" id="searchInput">
            </div>
            <div class="chat-list" id="chatList">
                <!-- 聊天列表动态生成 -->
            </div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <div class="chat-title">选择联系人开始聊天</div>
            </div>
            <div class="message-container" id="messageContainer">
                <div class="welcome-screen">
                    <div class="welcome-icon">💬</div>
                    <h2>局域网聊天</h2>
                    <p>启动服务器版本后，局域网内的设备将自动发现</p>
                    <p>选择左侧联系人开始聊天</p>
                </div>
            </div>
            <div class="input-area" id="inputArea" style="display: none;">
                <div class="input-toolbar">
                    <button class="tool-btn" id="emojiBtn" title="表情">😊</button>
                    <button class="tool-btn" id="imageBtn" title="图片">🖼️</button>
                    <button class="tool-btn" id="fileBtn" title="文件">📎</button>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                    <input type="file" id="fileInput" style="display: none;">
                </div>
                <div class="input-box-wrapper">
                    <div class="input-box" id="inputBox" contenteditable="true" placeholder="输入消息..."></div>
                    <button class="send-btn" id="sendBtn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 表情选择器 -->
    <div class="emoji-picker" id="emojiPicker" style="display: none;">
        <div class="emoji-grid"></div>
    </div>

    <!-- 服务器检测提示 -->
    <div class="server-modal" id="serverModal">
        <div class="modal-content">
            <div class="modal-icon">⚠️</div>
            <h3>需要服务器版本</h3>
            <p>局域网聊天功能需要通过服务器版本运行</p>
            <p>请下载并启动 DataToolbox 服务器版本</p>
            <div class="modal-actions">
                <button class="btn-primary" onclick="window.location.href='../../index.html'">返回首页</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
