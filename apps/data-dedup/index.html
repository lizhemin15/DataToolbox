<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据去重 - 数据工具箱</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <div class="logo-title">
                <span class="app-logo">🔍</span>
                <h1>数据去重</h1>
            </div>
        </header>
        
        <main class="content">
            <div id="uploadSection" class="upload-section">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <h3>拖拽或点击上传 Excel 文件</h3>
                    <p>支持 .xlsx, .xls, .csv 格式</p>
                    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" hidden>
                    <div class="upload-buttons">
                        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择文件</button>
                        <button class="sample-btn" onclick="downloadSample()">下载示例文件</button>
                    </div>
                </div>
                
                <div class="config-section" id="configSection" style="display: none;">
                    <h3>配置去重参数</h3>
                    
                    <div class="form-group">
                        <label for="keyColumn">去重依据列:</label>
                        <select id="keyColumn" class="select-input">
                            <option value="">请先上传文件</option>
                        </select>
                        <span class="hint">选择用于判断重复的列</span>
                    </div>
                    
                    <div class="form-group">
                        <label>去重策略:</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="strategy" value="first" checked>
                                <span>保留第一条</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="strategy" value="last">
                                <span>保留最后一条</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>去重选项:</label>
                        <div class="checkbox-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="caseSensitive">
                                <span>区分大小写</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="trimSpaces" checked>
                                <span>忽略首尾空格</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="ignoreEmpty" checked>
                                <span>忽略空值</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="file-info" id="fileInfo"></div>
                    <button class="process-btn" onclick="startDedup()">开始去重</button>
                </div>
            </div>
            
            <div id="processingSection" class="processing-section" style="display: none;">
                <div class="progress-container">
                    <div class="progress-icon">⏳</div>
                    <h3>正在处理中...</h3>
                </div>
            </div>
            
            <div id="resultSection" class="result-section" style="display: none;">
                <div class="result-header">
                    <h3>✓ 去重完成</h3>
                    <button class="download-btn" onclick="downloadResult()">下载结果</button>
                </div>
                <div class="result-stats" id="resultStats"></div>
                <div class="result-preview" id="resultPreview"></div>
                <button class="reset-btn" onclick="reset()">重新处理</button>
            </div>
        </main>
        
        <footer class="footer">
            <p>开发者：李哲民</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
