<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器学习算法学习 - 数据工具箱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <div class="logo-title">
                <span class="app-logo">🤖</span>
                <h1>机器学习算法学习</h1>
            </div>
        </header>

        <!-- 关卡选择界面 -->
        <div id="levelSelect" class="level-select">
            <div class="progress-bar-container">
                <div class="progress-bar" id="totalProgress"></div>
            </div>
            <p class="progress-text" id="progressText">已完成 0 / 0 关</p>
            <div class="level-grid" id="levelGrid"></div>
        </div>

        <!-- 关卡详情界面 -->
        <div id="levelDetail" class="level-detail" style="display:none;">
            <div class="level-header">
                <button class="nav-btn" id="btnPrevLevel">← 上一关</button>
                <span class="level-title" id="levelTitle"></span>
                <button class="nav-btn" id="btnNextLevel">下一关 →</button>
            </div>

            <div class="level-body">
                <!-- 左侧：教程+任务+数据 -->
                <div class="left-panel">
                    <div class="tutorial-section">
                        <h3>📖 教程</h3>
                        <div id="tutorialContent" class="tutorial-content"></div>
                    </div>
                    <div class="task-section">
                        <h3>🎯 任务</h3>
                        <div id="taskContent" class="task-content"></div>
                    </div>
                    <div class="data-section" id="dataSection" style="display:none;">
                        <h3>📋 参考数据</h3>
                        <div id="dataContent" class="data-content"></div>
                    </div>
                </div>

                <!-- 右侧：编辑器+输出+可视化 -->
                <div class="right-panel">
                    <div class="editor-section">
                        <div class="editor-toolbar">
                            <h3>✏️ JavaScript 编辑器</h3>
                            <div class="editor-actions">
                                <button class="reset-btn" id="btnReset" title="重置代码">🔄 重置</button>
                                <button class="hint-btn" id="btnHint" title="提示">💡 提示</button>
                                <button class="run-btn" id="btnRun">▶ 运行 (Ctrl+Enter)</button>
                            </div>
                        </div>
                        <textarea id="codeEditor" class="code-editor" spellcheck="false"></textarea>
                        <div class="hint-box" id="hintBox" style="display:none;"></div>
                    </div>
                    <div class="output-section">
                        <h3>📊 运行结果</h3>
                        <div id="outputArea" class="output-area">
                            <p class="placeholder-text">运行代码后在此查看结果</p>
                        </div>
                    </div>
                    <div class="canvas-section" id="canvasSection" style="display:none;">
                        <h3>📈 可视化</h3>
                        <canvas id="vizCanvas" width="500" height="320"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 通关弹窗 -->
        <div class="modal-overlay" id="successModal" style="display:none;">
            <div class="modal">
                <div class="modal-icon">🎉</div>
                <h2>恭喜通关！</h2>
                <p id="successMsg"></p>
                <div class="modal-actions">
                    <button class="modal-btn secondary" id="btnBackToList">返回关卡列表</button>
                    <button class="modal-btn primary" id="btnNextFromModal">下一关</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>开发者：李哲民</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
