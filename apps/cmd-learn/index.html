<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命令行运维学习 - 数据工具箱</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="back-btn" onclick="goBack()">← 返回</button>
            <div class="logo-title">
                <span class="app-logo">💻</span>
                <h1>命令行运维学习</h1>
            </div>
            <div class="os-toggle" id="osToggle">
                <button class="os-btn active" data-os="linux">🐧 Linux</button>
                <button class="os-btn" data-os="win">🪟 Windows</button>
            </div>
        </header>

        <!-- 应用说明区域 -->
        <div id="appInfo" class="app-info">
            <div class="info-card">
                <div class="info-icon">📋</div>
                <div class="info-content">
                    <h3>关于本课程</h3>
                    <p>本课程通过闯关方式，带你从零学习 Windows 和 Linux 下常用的命令行操作，涵盖文件管理、网络诊断、服务器运维、Docker 管理、数据库导入导出等核心技能。点击右上角可随时切换操作系统。</p>
                </div>
            </div>
        </div>

        <!-- 关卡选择界面 -->
        <div id="levelSelect" class="level-select">
            <div class="progress-bar-container">
                <div class="progress-bar" id="totalProgress"></div>
            </div>
            <p class="progress-text" id="progressText">已完成 0 / 0 关</p>
            <div class="level-grid" id="levelGrid"></div>
        </div>

        <!-- 关卡详情界面 -->
        <div id="levelDetail" class="level-detail" style="display:none;">
            <div class="level-header">
                <button class="nav-btn" id="btnPrevLevel">← 上一关</button>
                <span class="level-title" id="levelTitle"></span>
                <button class="nav-btn" id="btnNextLevel">下一关 →</button>
            </div>

            <div class="level-body">
                <!-- 左侧：教程+任务+参考 -->
                <div class="left-panel">
                    <div class="tutorial-section">
                        <h3>📖 教程</h3>
                        <div id="tutorialContent" class="tutorial-content"></div>
                    </div>
                    <div class="task-section">
                        <h3>🎯 任务</h3>
                        <div id="taskContent" class="task-content"></div>
                    </div>
                    <div class="context-section">
                        <h3>📋 参考信息</h3>
                        <div id="contextContent" class="context-content"></div>
                    </div>
                </div>

                <!-- 右侧：终端编辑器+结果 -->
                <div class="right-panel">
                    <div class="editor-section">
                        <div class="editor-toolbar">
                            <h3 id="editorTitle">✏️ 终端</h3>
                            <div class="editor-actions">
                                <button class="hint-btn" id="btnHint" title="提示">💡 提示</button>
                                <button class="run-btn" id="btnRun">▶ 验证</button>
                            </div>
                        </div>
                        <div class="terminal-wrapper">
                            <div class="terminal-prompt" id="terminalPrompt">$</div>
                            <textarea id="cmdEditor" class="cmd-editor" placeholder="在此输入命令..." spellcheck="false" rows="3"></textarea>
                        </div>
                        <div class="hint-box" id="hintBox" style="display:none;"></div>
                    </div>
                    <div class="result-section">
                        <h3>📊 验证结果</h3>
                        <div id="resultArea" class="result-area">
                            <p class="placeholder-text">输入命令后点击验证查看结果</p>
                        </div>
                    </div>
                    <div class="expected-section" id="expectedSection" style="display:none;">
                        <h3>✅ 参考答案</h3>
                        <div id="expectedArea" class="expected-area"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 通关弹窗 -->
        <div class="modal-overlay" id="successModal" style="display:none;">
            <div class="modal">
                <div class="modal-icon">🎉</div>
                <h2>恭喜通关！</h2>
                <p id="successMsg"></p>
                <div class="modal-actions">
                    <button class="modal-btn secondary" id="btnBackToList">返回关卡列表</button>
                    <button class="modal-btn primary" id="btnNextFromModal">下一关</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <p>开发者：李哲民</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
